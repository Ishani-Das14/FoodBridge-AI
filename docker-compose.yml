version: '3.8'

# ==============================================================================
# FoodBridge AI - Multi-Container Orchestration Setup
# Services: fastapi, react (nginx), postgresql, redis, celery-worker, celery-beat
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL Database Service with PostGIS Extension
  # ----------------------------------------------------------------------------
  db:
    image: postgis/postgis:15-3.4
    container_name: foodbridge_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodbridge_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodbridge_secure_pass_99}
      POSTGRES_DB: ${POSTGRES_DB:-foodbridge_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-foodbridge_admin} -d $${POSTGRES_DB:-foodbridge_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Redis Cache and Message Broker
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: foodbridge_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # FastAPI Backend Application Server
  # ----------------------------------------------------------------------------
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbridge_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-foodbridge_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-foodbridge_secure_pass_99}
      - POSTGRES_DB=${POSTGRES_DB:-foodbridge_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - PROJECT_NAME=${PROJECT_NAME:-FoodBridge AI}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-supersecretjwtkeythatshouldbechangedinproduction123!}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-11520}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8000}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - ROUTING_SOLVER_TIME_LIMIT_SECS=${ROUTING_SOLVER_TIME_LIMIT_SECS:-30}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Celery Background Task Worker
  # ----------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbridge_celery_worker
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-foodbridge_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-foodbridge_secure_pass_99}
      - POSTGRES_DB=${POSTGRES_DB:-foodbridge_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - PROJECT_NAME=${PROJECT_NAME:-FoodBridge AI}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-supersecretjwtkeythatshouldbechangedinproduction123!}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Celery Periodic Task Scheduler (Beat)
  # ----------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbridge_celery_beat
    restart: always
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-foodbridge_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-foodbridge_secure_pass_99}
      - POSTGRES_DB=${POSTGRES_DB:-foodbridge_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - PROJECT_NAME=${PROJECT_NAME:-FoodBridge AI}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-supersecretjwtkeythatshouldbechangedinproduction123!}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # React Frontend Service (Production Nginx Proxy)
  # ----------------------------------------------------------------------------
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodbridge_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
    depends_on:
      - fastapi

# ------------------------------------------------------------------------------
# Persistent Docker Volumes
# ------------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
