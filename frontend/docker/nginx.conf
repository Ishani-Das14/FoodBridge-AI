# ==============================================================================
# FoodBridge AI - Frontend Nginx Configuration
# Configured for Single Page Application (SPA) client-side routing
# ==============================================================================

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for better load performance
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Redirect server errors to standard blank logs or Nginx errors
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
